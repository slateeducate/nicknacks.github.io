<section>
<form action="/signup" method="post">

    <label for="name">
        Name
    </label>

    <input
        id="name"
        name="name"
        type="text"
        placeholder="e.g.James"
        required>

    <br><br>

    <label for="email">
        Email
    </label>

    <input
        id="email"
        name="email"
        type="email"
        placeholder="john@email.com"
        required>

    <br><br>

    <label for="password">
        Password
    </label>

    <input
        id="password"
        name="password"
        type="password"
        required>

    <br><br>

    <input type="submit" value="Join Nick Nacks">

</form>
</section>
